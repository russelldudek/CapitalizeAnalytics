name: Verify live campaign

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify Pages brand assets, routes, and downloads
        id: live
        continue-on-error: true
        run: node scripts/verify-pages.mjs
      - name: Record successful exact-SHA deployment status
        if: steps.live.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -d '{"state":"success","target_url":"https://russelldudek.github.io/CapitalizeAnalytics/","description":"Live brand assets, routes, and PDF hashes verified","context":"roleforge/pages-live"}'
      - name: Record failed deployment status
        if: steps.live.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -d '{"state":"failure","target_url":"https://russelldudek.github.io/CapitalizeAnalytics/","description":"Live Brand Fidelity deployment verification failed","context":"roleforge/pages-live"}'
          exit 1
