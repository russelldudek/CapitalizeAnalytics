name: Build campaign PDFs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "styles.css"
      - "assets/css/*.css"
      - "scripts/generate-pdfs.mjs"
      - ".github/workflows/build-pdfs.yml"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install playwright@1.52.0 pdf-lib@1.17.1
      - run: npx playwright install --with-deps chromium
      - run: node scripts/generate-pdfs.mjs
      - name: Commit PDFs and audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.pdf docs/pdf-audit.json
          git diff --cached --quiet || git commit -m "Generate and audit campaign PDFs"
          git push
