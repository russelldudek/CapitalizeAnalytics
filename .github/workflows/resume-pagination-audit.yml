name: Resume pagination audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "resume.html"
      - "assets/css/documents.css"
      - "assets/css/responsive.css"
      - "docs/Russell-Dudek-Resume-Capitalize.pdf"
      - "scripts/audit-resume-pagination.mjs"
      - ".github/workflows/resume-pagination-audit.yml"

permissions:
  contents: read
  statuses: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save playwright@1.52.0 pdf-lib@1.17.1
      - run: npx playwright install --with-deps chromium
      - name: Start local campaign server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/roleforge-http.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/resume.html >/dev/null && break; sleep 1; done
      - name: Audit resume page balance and pagination
        id: pagination
        continue-on-error: true
        env:
          LOCAL_BASE: http://127.0.0.1:4173/
        run: node scripts/audit-resume-pagination.mjs
      - name: Upload resume pagination evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capitalize-resume-pagination-audit
          path: audit/resume-pagination/
          if-no-files-found: error
          retention-days: 30
      - name: Publish pagination status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.pagination.outcome }}
        run: |
          if [ "$OUTCOME" = "success" ]; then
            STATE=success
            DESCRIPTION="Two-page resume has no clipping, footer overlap, or page-balance failure"
          else
            STATE=failure
            DESCRIPTION="Resume pagination or page-balance audit failed"
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state="$STATE" -f context="roleforge/resume-pagination" -f description="$DESCRIPTION" -f target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Fail when pagination audit fails
        if: steps.pagination.outcome != 'success'
        run: exit 1
