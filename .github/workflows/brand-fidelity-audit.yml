name: Brand fidelity and rendered campaign audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "styles.css"
      - "brand-tokens.css"
      - "brand-intelligence.md"
      - "campaign-metadata.json"
      - "artifact-manifest.json"
      - "app.js"
      - "assets/css/*.css"
      - "assets/brand/**"
      - "docs/*.pdf"
      - "scripts/audit-brand-fidelity-v2.mjs"
      - ".github/workflows/brand-fidelity-audit.yml"

permissions:
  contents: write
  statuses: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save playwright@1.52.0 pdf-lib@1.17.1 sharp@0.33.5
      - run: npx playwright install --with-deps chromium
      - name: Start local campaign server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/roleforge-http.log 2>&1 &
          echo $! > /tmp/roleforge-http.pid
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && break; sleep 1; done
      - name: Run rendered brand audit
        id: audit
        continue-on-error: true
        env:
          LOCAL_BASE: http://127.0.0.1:4173/
        run: node scripts/audit-brand-fidelity-v2.mjs
      - name: Upload rendered audit bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capitalize-brand-fidelity-audit
          path: audit/brand-fidelity/
          if-no-files-found: error
          retention-days: 30
      - name: Commit passing audit record
        if: steps.audit.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/brand-fidelity/audit.json audit/brand-fidelity/summary.md audit/brand-fidelity/run-id.txt
          git diff --cached --quiet || git commit -m "Record passing Capitalize Brand Fidelity Audit"
          git push
      - name: Publish exact-SHA audit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        run: |
          FINAL_SHA=$(git rev-parse HEAD)
          if [ "$AUDIT_OUTCOME" = "success" ]; then STATE=success; DESCRIPTION="Brand Fidelity and rendered campaign audit passed"; else STATE=failure; DESCRIPTION="Brand Fidelity or rendered campaign audit failed"; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${FINAL_SHA}" -f state="$STATE" -f context="roleforge/brand-fidelity" -f description="$DESCRIPTION" -f target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Fail workflow when audit fails
        if: steps.audit.outcome != 'success'
        run: exit 1
